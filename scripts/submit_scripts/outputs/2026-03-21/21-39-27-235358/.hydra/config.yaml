paradigm:
  paradigm: multiframefm
domain:
  domain: protein
datamodule:
  _target_: proteinzen.data.datasets.datamodule.BiomoleculeDataModule
  _partial_: true
  batch_size: 1
  num_workers: 8
dataset:
  config: /mnt/scratch/user/daviyang/proteinzen/configs/train/data/afdb_128.yaml
lmodule:
  _target_: proteinzen.runtime.lmod.BiomoleculeModule
  _partial_: true
  use_cosine_lr_sched: false
  cosine_warmup_steps: 0
  cosine_total_steps: 1000000.0
  use_linear_warmup: false
  linear_warmup_steps: 0
  use_lr_step_decay: false
  lr_step_decay_start: 0
  lr_step_decay_step: 1
  lr_step_decay_factor: 0.95
  use_ema: true
  ema_decay: 0.999
  use_posthoc_ema: false
  seq_weight:
    <pad>: 1.0
    '-': 1.0
    ALA: 1.0
    ARG: 2.0
    ASN: 1.0
    ASP: 1.0
    CYS: 2.0
    GLN: 2.0
    GLU: 2.0
    GLY: 1.0
    HIS: 2.0
    ILE: 1.0
    LEU: 1.0
    LYS: 1.0
    MET: 1.0
    PHE: 1.0
    PRO: 2.0
    SER: 1.0
    THR: 1.0
    TRP: 2.0
    TYR: 1.0
    VAL: 1.0
    UNK: 1.0
    A: 1.0
    G: 1.0
    C: 1.0
    U: 1.0
    'N': 1.0
    DA: 1.0
    DG: 1.0
    DC: 1.0
    DT: 1.0
    DN: 1.0
  use_euclidean_for_rots: false
  learnable_noise_schedule: false
  direct_rot_vf_loss: false
  rot_angle_weight: 0.5
  self_condition_rate: 0.5
  atom_rigid_upweight: true
  compile_model: false
  apply_self_folding: false
  strict_weight_loading: true
corrupter:
  _target_: proteinzen.stoch_interp.multiframe.MultiSE3Interpolant
  min_t: 0.01
  separate_ot: true
  prealign_noise: true
  trans_preconditioning: false
  trans_prior_std: 16
  rigids_per_res: 3
  lognorm_t_sched: false
  lognorm_mu: 0.0
  lognorm_sig: 1.0
  mixed_beta_t_sched: false
  beta_p1: 1.9
  beta_p2: 1.0
  shift_time_scale: false
  use_diffusion_forcing: false
  use_stochastic_centering: true
  center_on_motif: true
  sig_perturb: 4.0
  use_uniform_rot_noise: false
  use_unwrapped_rot_noise: false
  unwrapped_rot_noise_sig: 1.5
  trans_gamma: 0.16
  trans_step_size: 1.5
  rot_gamma: 0.16
  rot_step_size: 1.5
  rot_sample_schedule: linear
  sampling_noise_mode: churn
  sampling_churn: 0.4
  churn_by_sigma: false
  num_timesteps: 400
  use_euclidean_for_rots: false
  rot_sfm: false
  unconditional_guidance_alpha: 0.0
  dynamic_cfg: false
  rot_g_t_fn: fn1
  trans_g_t_fn: fn1
model:
  _target_: proteinzen.model.denoiser.IpaMultiRigidDenoiser
  c_s: 768
  c_cond: 768
  c_z: 128
  c_frame: 256
  c_framepair: 64
  c_hidden: 16
  c_hidden_trig: 32
  c_hidden_trig_embedder: 64
  num_heads: 16
  num_qk_points: 8
  num_v_points: 12
  num_blocks: 12
  trans_preconditioning: false
  rot_preconditioning: true
  block_q: 16
  block_k: 96
  use_conditioned_ipa: true
  use_conditioned_rigid_transformer: false
  rigid_transformer_num_blocks: 1
  rigid_transformer_num_heads: 4
  rigid_transformer_rigid_updates: true
  rigid_transformer_agg_embed: true
  rigid_transformer_add_vanilla_transformer: false
  rigid_transformer_add_second_transformer: false
  rigid_transformer_add_full_transformer: false
  use_embedder_sc_rigid_transformer: true
  rel_quat_pair_updates: false
  z_broadcast: true
  compile_ipa: false
  use_ipa_gating: true
  ablate_ipa_down_z: false
  ipa_row_dropout_r: 0.0
  tfmr_row_dropout_r: 0.0
  cg_version: 1
  use_qk_norm: true
  use_amp: true
  predict_final_rot: false
  direct_rot_vf_output: false
  learnable_noise_schedule: false
  use_pairformer: false
  rot_vf_scaling: 1
  self_conditioning: true
  self_folding: false
  use_residue_indexing: true
  num_registers: 0
tasks:
  config: /mnt/scratch/user/daviyang/proteinzen/configs/train/tasks/train_128.yaml
experiment:
  warm_start: null
  optim:
    _target_: torch.optim.adam.Adam
    _partial_: true
    lr: 0.0001
    betas:
    - 0.9
    - 0.999
    eps: 1.0e-08
    weight_decay: 0.0
    amsgrad: false
    foreach: null
    maximize: false
    capturable: false
    differentiable: false
    fused: null
  lightning:
    _target_: lightning.pytorch.trainer.trainer.Trainer
    _partial_: true
    accelerator: auto
    strategy: auto
    devices: auto
    num_nodes: 1
    precision: null
    logger: null
    callbacks: null
    fast_dev_run: false
    max_epochs: -1
    min_epochs: 1
    max_steps: -1
    min_steps: null
    max_time: null
    limit_train_batches: null
    limit_val_batches: null
    limit_test_batches: null
    limit_predict_batches: null
    overfit_batches: 0.0
    val_check_interval: null
    check_val_every_n_epoch: 1
    num_sanity_val_steps: null
    log_every_n_steps: 50
    enable_checkpointing: null
    enable_progress_bar: null
    enable_model_summary: null
    accumulate_grad_batches: 1
    gradient_clip_val: null
    gradient_clip_algorithm: null
    deterministic: null
    benchmark: null
    inference_mode: true
    use_distributed_sampler: false
    profiler: null
    detect_anomaly: false
    barebones: false
    plugins: null
    sync_batchnorm: false
    reload_dataloaders_every_n_epochs: 0
    default_root_dir: null
    enable_autolog_hparams: true
    model_registry: null
  checkpointer:
    _target_: lightning.pytorch.callbacks.model_checkpoint.ModelCheckpoint
    dirpath: null
    filename: null
    monitor: null
    verbose: false
    save_last: true
    save_top_k: -1
    save_on_exception: false
    save_weights_only: false
    mode: min
    auto_insert_metric_name: true
    every_n_train_steps: null
    train_time_interval:
      days: 1.0
      seconds: 0.0
      microseconds: 0.0
      milliseconds: 0.0
      minutes: 0.0
      hours: 0.0
      weeks: 0.0
      _target_: datetime.timedelta
    every_n_epochs: null
    save_on_train_epoch_end: true
    enable_version_counter: true
  wandb:
    offline: true
debug: true
