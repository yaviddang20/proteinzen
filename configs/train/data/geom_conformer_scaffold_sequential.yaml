_target_: proteinzen.data.datasets.datamodule.TrainingDataset
max_crop_residues: 1 #160
max_crop_rigids: 192 # 512
use_cropper: false #true
samples_per_epoch: 8000
datasets:
  - _target_: proteinzen.data.datasets.dataset.MMCIFDataset
    mode: train
    min_num_res: 0
    # overfit_num: 1
    data_dir: ${oc.env:REPO_ROOT}/data/geom_drugs_conformers
    data_sampler:
      _target_: proteinzen.boltz.data.sample.random.ConformerSampler
    task_sampler:
      _target_: proteinzen.runtime.training.task.TaskSampler
      task_list:
        - _target_: proteinzen.runtime.training.unconditional.UnconditionalGeneration
          prob: 0.6
          t_sched: lognorm
          lognorm_mu: 0.0
          lognorm_sig: 1.0
          beta_p1: 1.9
          beta_p2: 1.0
          shift_time_scale: false
          t_min: 0.00
          t_max: 0.99
        - _target_: proteinzen.runtime.training.mol_fragment.MolFragmentScaffolding
          prob: 0.2
          t_sched: lognorm
          lognorm_mu: 0.0
          lognorm_sig: 1.0
          t_min: 0.01
          t_max: 0.99
          min_frac_atoms: 0.1
          max_frac_atoms: 0.5
        - _target_: proteinzen.runtime.training.mol_sequential.MolSequentialScaffolding
          prob: 0.2
          t_sched: lognorm
          lognorm_mu: 0.0
          lognorm_sig: 1.0
          t_min: 0.01
          t_max: 0.99
          min_frac_atoms: 0.1
          max_frac_atoms: 0.5
    exclude_mol_types:
      - "DNA"
      - "RNA"
